<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pictionary Ultra - Hidden Mode</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f0f2f5;
            --accent-color: #f39c12;
            --success-color: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }

        .game-status {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 1000px;
        }

        .status-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100px;
        }

        #category-display { font-size: 14px; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        #word-display { font-size: 28px; font-weight: bold; color: var(--primary-color); letter-spacing: 3px; }

        .toolbar {
            display: flex;
            gap: 15px;
            background: #333;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 15px;
            align-items: center;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .color-palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .swatch { width: 22px; height: 22px; border-radius: 3px; cursor: pointer; border: 2px solid transparent; }
        .swatch.active { border-color: white; transform: scale(1.1); }

        .btn { padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-start { background: var(--success-color); color: white; margin-bottom: 5px; }
        .btn-reveal { background: var(--accent-color); color: white; }
        .btn-clear { background: #e74c3c; color: white; }
        .tool-btn { background: #95a5a6; color: white; font-size: 12px; }
        .tool-btn.active { background: var(--accent-color); }

        .canvas-container {
            position: relative;
            cursor: none;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 4px solid #ddd;
        }

        #brush-cursor {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.5);
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>

    <div id="brush-cursor"></div>

    <div class="game-status">
        <div class="status-card">
            <button class="btn btn-start" id="start-game">NEW WORD</button>
            <button class="btn btn-reveal" id="reveal-word">REVEAL WORD</button>
        </div>
        <div class="status-card">
            <div id="category-display">Select a word to begin</div>
            <div id="word-display">_ _ _ _ _</div>
        </div>
    </div>

    <div class="toolbar">
        <div class="color-palette" id="palette"></div>
        
        <div style="text-align: center;">
            <label style="font-size: 10px; display: block;">SIZE</label>
            <input type="range" id="size-slider" min="2" max="60" value="8">
        </div>

        <button class="btn tool-btn active" id="pen-tool">PEN</button>
        <button class="btn tool-btn" id="fill-tool">FILL</button>
        <button class="btn tool-btn" id="eraser-tool">ERASER</button>
        <button class="btn btn-clear" id="clear">CLEAR ALL</button>
    </div>

    <div class="canvas-container" id="c-wrap">
        <canvas id="paint-canvas" width="1000" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('paint-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const wordEl = document.getElementById('word-display');
        const categoryEl = document.getElementById('category-display');
        const cursor = document.getElementById('brush-cursor');
        
        let isDrawing = false;
        let currentBrushColor = '#000000';
        let currentTool = 'pen';
        let secretWord = "";

        const gameData = {
    "MOVIES": [
        /* 0 */ "Jurassic Park", /* 1 */ "Finding Nemo", /* 2 */ "Jaws", 
        /* 3 */ "The Lion King", /* 4 */ "Star Wars",    /* 5 */ "The Matrix", 
        /* 6 */ "Harry Potter",  /* 7 */ "Frozen",       /* 8 */ "Spider Man", 
        /* 9 */ "Home Alone",    /* 10 */ "Ghostbusters",/* 11 */ "The Avengers", 
        /* 12 */ "Avatar",       /* 13 */ "Shrek",       /* 14 */ "Batman"
    ],
    "ANIMALS": [
        /* 0 */ "Elephant",  /* 1 */ "Giraffe",    /* 2 */ "Penguin", 
        /* 3 */ "Octopus",   /* 4 */ "Kangaroo",   /* 5 */ "Shark", 
        /* 6 */ "Chameleon", /* 7 */ "Flamingo",   /* 8 */ "Platypus", 
        /* 9 */ "Lion",      /* 10 */ "Zebra",     /* 11 */ "Dolphin", 
        /* 12 */ "Hedgehog", /* 13 */ "Scorpion",  /* 14 */ "Butterfly", 
        /* 15 */ "Peacock",  /* 16 */ "Gorilla",   /* 17 */ "Owl"
    ],
    "FAMOUS PEOPLE": [
        /* 0 */ "Albert Einstein",  /* 1 */ "Marilyn Monroe",  /* 2 */ "Darth Vader", 
        /* 3 */ "Sherlock Holmes",  /* 4 */ "Mickey Mouse",    /* 5 */ "Elvis Presley", 
        /* 6 */ "Abraham Lincoln",  /* 7 */ "Cleopatra",       /* 8 */ "William Shakespeare", 
        /* 9 */ "Taylor Swift",     /* 10 */ "Cristiano Ronaldo", /* 11 */ "Beyonce",
        /* 12 */ "Leonardo da Vinci",/* 13 */ "Marie Curie",   /* 14 */ "Charlie Chaplin"
    ],
    "LANDMARKS": [
        /* 0 */ "Eiffel Tower",      /* 1 */ "Statue of Liberty", /* 2 */ "Great Wall of China", 
        /* 3 */ "Pyramids of Giza",  /* 4 */ "Stonehenge",        /* 5 */ "Leaning Tower of Pisa", 
        /* 6 */ "Sydney Opera House",/* 7 */ "Taj Mahal",         /* 8 */ "Big Ben", 
        /* 9 */ "Colosseum",         /* 10 */ "Golden Gate Bridge",/* 11 */ "Mount Rushmore", 
        /* 12 */ "Empire State Building"
    ]
};

        // UI Setup - Palette
        const colors = ['#000000', '#ffffff', '#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#3498db', '#9b59b6', '#795548', '#95a5a6'];
        const palette = document.getElementById('palette');
        colors.forEach(c => {
            const s = document.createElement('div');
            s.className = 'swatch' + (c === '#000000' ? ' active' : '');
            s.style.background = c;
            s.onclick = () => {
                currentBrushColor = c;
                document.querySelectorAll('.swatch').forEach(sw => sw.classList.remove('active'));
                s.classList.add('active');
            };
            palette.appendChild(s);
        });

        // Tool Selection
        const tools = { 'pen': document.getElementById('pen-tool'), 'fill': document.getElementById('fill-tool'), 'eraser': document.getElementById('eraser-tool') };
        Object.keys(tools).forEach(key => {
            tools[key].onclick = () => {
                currentTool = key;
                Object.values(tools).forEach(btn => btn.classList.remove('active'));
                tools[key].classList.add('active');
            };
        });

        // Word Logic
        function generateBlanks(word) {
            return word.split('').map(char => {
                if (char === ' ') return '&nbsp;&nbsp;';
                return '_';
            }).join(' ');
        }

        document.getElementById('start-game').onclick = () => {
            const cats = Object.keys(gameData);
            const catName = cats[Math.floor(Math.random() * cats.length)];
            const categoryList = gameData[catName];
            
            // Pick a random index
            const wordIndex = Math.floor(Math.random() * categoryList.length);
            secretWord = categoryList[wordIndex];
            
            // Display Category + The ID Number for the drawer
            categoryEl.innerHTML = `CATEGORY: <b>${catName}</b> (Word ID: #${wordIndex})`;
            
            // Show blanks for the guessers
            wordEl.innerHTML = generateBlanks(secretWord);
            
            // Auto-clear canvas for the new turn
            ctx.clearRect(0,0,canvas.width,canvas.height);
        };

        document.getElementById('reveal-word').onclick = () => {
            if(secretWord) wordEl.innerText = secretWord;
        };

        // Flood Fill & Drawing (Internal Logic remains from previous version)
        function hexToRgb(hex) {
            const int = parseInt(hex.slice(1), 16);
            return [(int >> 16) & 255, (int >> 8) & 255, int & 255, 255];
        }

        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const targetColor = getPixel(startX, startY, data);
            const fillRGB = hexToRgb(fillColor);
            if (colorsMatch(targetColor, fillRGB)) return;
            const queue = [[startX, startY]];
            while (queue.length > 0) {
                const [x, y] = queue.shift();
                const currentColor = getPixel(x, y, data);
                if (colorsMatch(currentColor, targetColor)) {
                    setPixel(x, y, fillRGB, data);
                    if (x > 0) queue.push([x - 1, y]);
                    if (x < canvas.width - 1) queue.push([x + 1, y]);
                    if (y > 0) queue.push([x, y - 1]);
                    if (y < canvas.height - 1) queue.push([x, y + 1]);
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function getPixel(x, y, data) { const i = (y * canvas.width + x) * 4; return [data[i], data[i+1], data[i+2], data[i+3]]; }
        function setPixel(x, y, color, data) { const i = (y * canvas.width + x) * 4; data[i] = color[0]; data[i+1] = color[1]; data[i+2] = color[2]; data[i+3] = color[3]; }
        function colorsMatch(c1, c2) { return c1[0] === c2[0] && c1[1] === c2[1] && c1[2] === c2[2] && c1[3] === c2[3]; }

        function getPos(e) { const rect = canvas.getBoundingClientRect(); return { x: Math.round(e.clientX - rect.left), y: Math.round(e.clientY - rect.top) }; }

        canvas.onmousedown = (e) => {
            const {x, y} = getPos(e);
            if (currentTool === 'fill') floodFill(x, y, currentBrushColor);
            else { isDrawing = true; ctx.beginPath(); ctx.moveTo(x, y); }
        };

        window.onmousemove = (e) => {
            const size = document.getElementById('size-slider').value;
            cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
            cursor.style.width = size + 'px'; cursor.style.height = size + 'px';
            cursor.style.backgroundColor = currentTool === 'eraser' ? 'white' : currentBrushColor;
            if (!isDrawing || currentTool === 'fill') return;
            const {x, y} = getPos(e);
            ctx.lineWidth = size; ctx.lineCap = 'round';
            ctx.strokeStyle = currentTool === 'eraser' ? '#ffffff' : currentBrushColor;
            ctx.lineTo(x, y); ctx.stroke();
        };

        window.onmouseup = () => isDrawing = false;
        document.getElementById('clear').onclick = () => ctx.clearRect(0,0,canvas.width,canvas.height);
        document.getElementById('c-wrap').onmouseenter = () => cursor.style.display = 'block';
        document.getElementById('c-wrap').onmouseleave = () => cursor.style.display = 'none';
    </script>
</body>
</html>
